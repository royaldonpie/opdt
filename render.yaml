services:
  - type: web
    name: opdt-platform
    env: node
    buildCommand: "npm install --prefix frontend && npm run build --prefix frontend && npm install --prefix backend"
    startCommand: "node backend/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
